name: Build & Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

concurrency:
  group: release
  cancel-in-progress: true

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install Rust
        uses: dtolnay/rust-action@stable
        with:
          targets: x86_64-pc-windows-msvc

      - name: Install frontend dependencies
        run: npm ci

      - name: Build Tauri (NSIS + MSI)
        run: npm run tauri:build
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}

      - name: Find installer files
        shell: bash
        run: |
          echo "NSIS files:"
          find src-tauri/target/release/bundle -name "*.exe" -type f 2>/dev/null | head -5
          echo "MSI files:"
          find src-tauri/target/release/bundle -name "*.msi" -type f 2>/dev/null | head -5

      - name: Upload NSIS installer
        uses: softprops/action-gh-release@v2
        with:
          files: src-tauri/target/release/bundle/nsis/*.exe
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload MSI installer
        uses: softprops/action-gh-release@v2
        with:
          files: src-tauri/target/release/bundle/msi/*.msi
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  build-macos:
    runs-on: macos-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install Rust
        uses: dtolnay/rust-action@stable

      - name: Install frontend dependencies
        run: npm ci

      - name: Build Tauri
        run: npm run tauri:build

      - name: Upload macOS binary
        uses: softprops/action-gh-release@v2
        with:
          files: src-tauri/target/release/remembry
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
