name: Build & Release

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@v1
        with:
          toolchain: stable
          targets: x86_64-pc-windows-msvc

      - name: Install frontend dependencies
        run: npm ci

      - name: Build Tauri (NSIS + MSI)
        run: npm run tauri:build
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}

      - name: List bundle output
        shell: bash
        run: |
          echo "=== Bundle contents ==="
          find src-tauri/target/release/bundle -type f 2>/dev/null || echo "No bundle dir"

      - name: Upload Windows installers
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          files: |
            src-tauri/target/release/bundle/nsis/*.exe
            src-tauri/target/release/bundle/msi/*.msi
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  build-macos:
    runs-on: macos-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@v1
        with:
          toolchain: stable

      - name: Install create-dmg
        run: brew install create-dmg

      - name: Import Developer ID certificate
        run: |
          echo "${{ secrets.DEVELOPER_ID_CERT }}" | base64 -d > cert.p12
          security import cert.p12 -k ~/Library/Keychains/login.keychain-db -P "${{ secrets.DEVELOPER_ID_PASSWORD }}" -T /usr/bin/codesign -T /usr/bin/productsign || true
          security list-keychain
          security find-cert -c "D579YXN546" || echo "Certificate not found"
          rm cert.p12

      - name: Install frontend dependencies
        run: npm ci

      - name: Build Tauri (DMG)
        run: npm run tauri:build

      - name: Find and sign the app bundle
        id: find-app
        run: |
          APP_PATH=$(find src-tauri/target/release/bundle -name "*.app" -type d 2>/dev/null | head -1)
          echo "app_path=$APP_PATH" >> $GITHUB_OUTPUT
          echo "Found app at: $APP_PATH"
          if [ -n "$APP_PATH" ]; then
            echo "Signing with Developer ID..."
            codesign -s "Developer ID Application: Ji Yu Kong (D579YXN546)" --force --deep --preserve=identifier -f "$APP_PATH"
          fi

      - name: Rebuild DMG with signed app
        run: |
          APP_DIR=$(dirname "$APP_PATH")
          create-dmg \
            --identifier "com.remembry.app" \
            --overwrite \
            --output "$APP_DIR" \
            "$APP_PATH"

      - name: Strip quarantine from DMG
        run: |
          find src-tauri/target/release/bundle -name "*.dmg" -exec xattr -cr {} \;

      - name: List bundle output
        run: |
          echo "=== Bundle contents ==="
          find src-tauri/target/release/bundle -type f 2>/dev/null || echo "No bundle dir"

      - name: Upload macOS assets
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          files: |
            src-tauri/target/release/bundle/dmg/*.dmg
            src-tauri/target/release/remembry
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
