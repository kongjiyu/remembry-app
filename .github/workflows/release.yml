name: Build & Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@v1
        with:
          targets: x86_64-pc-windows-msvc

      - name: Install frontend dependencies
        run: npm ci

      - name: Build Tauri (NSIS + MSI)
        run: npm run tauri:build
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}

      - name: List bundle output
        shell: bash
        run: |
          echo "=== Bundle contents ==="
          find src-tauri/target/release/bundle -type f 2>/dev/null || echo "No bundle dir"
          echo "=== Release dir ==="
          ls -la src-tauri/target/release/*.exe 2>/dev/null || echo "No exe in release"

      - name: Upload NSIS installer
        if: always()
        uses: softprops/action-gh-release@v2
        continue-on-error: true
        with:
          tag_name: ${{ github.ref_name }}
          files: |
            src-tauri/target/release/bundle/nsis/*.exe
            src-tauri/target/release/bundle/msi/*.msi
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  build-macos:
    runs-on: macos-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@v1

      - name: Install frontend dependencies
        run: npm ci

      - name: Build Tauri
        run: npm run tauri:build

      - name: List release output
        run: ls -la src-tauri/target/release/remembry 2>/dev/null || echo "No binary"

      - name: Upload macOS binary
        if: always()
        uses: softprops/action-gh-release@v2
        continue-on-error: true
        with:
          tag_name: ${{ github.ref_name }}
          files: src-tauri/target/release/remembry
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
